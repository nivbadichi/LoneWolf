name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "code/client/**"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload code/client as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
