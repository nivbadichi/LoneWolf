<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoneWolf - Events</title>

  <link rel="stylesheet" href="style/reset.css" />
  <link rel="stylesheet" href="style/main.css" />
  <link rel="stylesheet" href="style/navbar.css" />
  <link rel="stylesheet" href="style/modal.css" />
  <link rel="stylesheet" href="style/toast.css" />
  <link rel="stylesheet" href="style/event-card.css" />
  <link rel="stylesheet" href="style/pages.css" />
</head>
<body>
  <header id="navbar">
    <nav class="navbar">
      <a href="index.html" class="navbar__brand">LoneWolf</a>
      <div class="navbar__links">
        <a href="events.html" class="navbar__auth-only">Events</a>
        <a href="profile.html" class="navbar__auth-only">Profile</a>
        <a href="notifications.html" class="navbar__auth-only">Notifications</a>
        <a href="admin.html" class="navbar__admin-only">Admin</a>
        <a href="login.html" class="navbar__guest-only">Log In</a>
        <a href="register.html" class="navbar__guest-only">Register</a>
        <button id="logout-btn" class="navbar__auth-only">Log Out</button>
      </div>
    </nav>
  </header>

  <main id="app">
    <section class="page-section">
      <h1>Discover Events</h1>

      <div class="events-view-toggle">
        <button id="view-map-btn" type="button" class="events-view-toggle__btn events-view-toggle__btn--active">
          Map View
        </button>
        <button id="view-list-btn" type="button" class="events-view-toggle__btn">List View</button>
      </div>

      <div id="events-map" class="events-map"></div>
      <div id="events-list" class="event-list is-hidden"></div>
    </section>
  </main>

  <div id="modal-root"></div>

  <script type="module" src="js/components/navbar.js"></script>
  <script type="module" src="js/pages/eventsPage.js"></script>
</body>
</html>
